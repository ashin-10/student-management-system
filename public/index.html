<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero-card">
        <div>
          <p class="eyebrow">Student Dashboard</p>
          <h1>Manage learners with a clean and modern portal.</h1>
        </div>
        <div class="hero-badge" id="student-count">0 students</div>
      </header>

      <section class="content-grid">
        <article class="card form-card">
          <h2 id="form-title">Add Student</h2>
          <form id="student-form">
            <input type="hidden" id="student-id" />
            <label>
              Full Name
              <input id="name" name="name" type="text" placeholder="Alicia Brown" required />
            </label>
            <label>
              Email Address
              <input id="email" name="email" type="email" placeholder="alicia@example.com" required />
            </label>
            <label>
              Course
              <input id="course" name="course" type="text" placeholder="Computer Science" required />
            </label>
            <label>
              Grade
              <input id="grade" name="grade" type="number" min="0" max="100" placeholder="88" required />
            </label>
            <div class="actions">
              <button type="submit" id="submit-button">Save Student</button>
              <button type="button" id="cancel-edit" class="secondary">Cancel</button>
            </div>
            <p id="status-message" class="status-message"></p>
          </form>
        </article>

        <article class="card table-card">
          <div class="table-header">
            <h2>Student Directory</h2>
            <span class="pill" id="table-summary">0 entries</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Course</th>
                  <th>Grade</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="student-list"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
